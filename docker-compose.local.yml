services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pegas_service_desk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - pegas_service_desk_local_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pegas_service_desk"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pegas_service_desk_local_postgres:
